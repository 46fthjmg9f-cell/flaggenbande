name = "factverse-meta-scheduler"
main = "src/index.ts"
compatibility_date = "2026-07-19"

[vars]
YOUTUBE_CHANNEL_ID = "UC6DrB40JdSAQIEUUe-M382w"
UPLOAD_STAGING_MEDIA_PROJECT = "factverse-instagram-media"

# A Cron Trigger is the authoritative clock. Publication continues even when
# the FactVerse dashboard and the production Mac are offline.
[triggers]
crons = ["* * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "factverse-meta-scheduler"
database_id = "94c64871-c8a0-4203-b6ea-b0043d764ebb"
