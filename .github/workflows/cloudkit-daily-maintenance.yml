name: Maintain CloudKit daily challenges and winners

on:
  workflow_dispatch:
    inputs:
      task:
        description: Maintenance scope
        required: true
        default: both
        type: choice
        options:
          - both
          - challenge
          - winner
      environment:
        description: CloudKit environment
        required: true
        default: development
        type: choice
        options:
          - development
          - production
      apply:
        description: Apply writes (also requires repository variable CLOUDKIT_DAILY_WRITES_ENABLED=true)
        required: true
        default: false
        type: boolean
  schedule:
    # 02:25 CET / 03:25 CEST: after the 02:14:59 Berlin winner freeze.
    - cron: '25 1 * * *'
    # 22:40 CET / 23:40 CEST: publish tomorrow's deterministic challenges.
    - cron: '40 21 * * *'

permissions:
  contents: read

concurrency:
  group: cloudkit-daily-maintenance
  cancel-in-progress: false

jobs:
  maintain:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify maintenance logic
        run: node --test scripts/cloudkit-daily-maintenance.test.mjs
      - name: Maintain trusted CloudKit records
        env:
          CLOUDKIT_CONTAINER: ${{ secrets.CLOUDKIT_CONTAINER }}
          CLOUDKIT_KEY_ID: ${{ secrets.CLOUDKIT_KEY_ID }}
          CLOUDKIT_PRIVATE_KEY: ${{ secrets.CLOUDKIT_PRIVATE_KEY }}
          CLOUDKIT_DAILY_WRITES_ENABLED: ${{ vars.CLOUDKIT_DAILY_WRITES_ENABLED }}
          REQUESTED_TASK: ${{ inputs.task }}
          REQUESTED_ENVIRONMENT: ${{ inputs.environment }}
          REQUESTED_APPLY: ${{ inputs.apply }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        shell: bash
        run: |
          set -euo pipefail

          task="${REQUESTED_TASK:-both}"
          environment="${REQUESTED_ENVIRONMENT:-production}"
          days_back=7
          days_forward=1

          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            environment=production
            if [[ "${EVENT_SCHEDULE}" == "25 1 * * *" ]]; then
              # Also republishes current/tomorrow as a recovery path if the
              # evening challenge run was delayed by GitHub Actions.
              task=both
            else
              task=challenge
              days_back=1
            fi
          fi

          arguments=(
            "--task=${task}"
            "--environment=${environment}"
            "--days-back=${days_back}"
            "--days-forward=${days_forward}"
          )

          if [[ "${CLOUDKIT_DAILY_WRITES_ENABLED:-false}" == "true" ]] \
            && { [[ "${GITHUB_EVENT_NAME}" == "schedule" ]] || [[ "${REQUESTED_APPLY:-false}" == "true" ]]; }; then
            arguments+=(--apply)
          fi

          node scripts/cloudkit-daily-maintenance.mjs "${arguments[@]}"
