name: Publish analytics dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * *'
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'scripts/collect-dashboard-data.mjs'
      - 'scripts/social-platforms.mjs'
      - 'tests/social-platforms.test.mjs'
      - '.github/workflows/dashboard.yml'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 2 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: dashboard/package-lock.json }
      - name: Verify social platform collector
        run: node --test tests/social-platforms.test.mjs
      - name: Collect and aggregate private source data
        env:
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
          ASC_ANALYTICS_REPORT_REQUEST_ID: ${{ secrets.ASC_ANALYTICS_REPORT_REQUEST_ID }}
          ASC_VENDOR_NUMBER: ${{ secrets.ASC_VENDOR_NUMBER }}
          ASC_FINANCE_ISSUER_ID: ${{ secrets.ASC_FINANCE_ISSUER_ID }}
          ASC_FINANCE_KEY_ID: ${{ secrets.ASC_FINANCE_KEY_ID }}
          ASC_FINANCE_PRIVATE_KEY: ${{ secrets.ASC_FINANCE_PRIVATE_KEY }}
          CLOUDKIT_CONTAINER: ${{ secrets.CLOUDKIT_CONTAINER }}
          CLOUDKIT_KEY_ID: ${{ secrets.CLOUDKIT_KEY_ID }}
          CLOUDKIT_PRIVATE_KEY: ${{ secrets.CLOUDKIT_PRIVATE_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_ANALYTICS_REFRESH_TOKEN: ${{ secrets.YOUTUBE_ANALYTICS_REFRESH_TOKEN }}
          META_GRAPH_API_VERSION: ${{ vars.META_GRAPH_API_VERSION }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
        run: node scripts/collect-dashboard-data.mjs
      - name: Commit only safe aggregates
        run: |
          git config user.name 'Flaggenbande Analytics Bot'
          git config user.email 'actions@users.noreply.github.com'
          git add dashboard/public/data/dashboard.json
          git diff --cached --quiet || git commit -m 'Update aggregated dashboard data'
          git push
      - run: npm ci
        working-directory: dashboard
      - run: npm run check && npm run build
        working-directory: dashboard
      - uses: actions/upload-pages-artifact@v3
        with: { path: dashboard/dist }
  deploy:
    needs: collect
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
